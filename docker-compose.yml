services:
  x-api:
    image: alpine
    container_name: x-api-test
    command: sleep infinity
    healthcheck:
      test: ["CMD", "echo", "API is healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  x-db:
    image: alpine
    container_name: x-db-test
    command: sleep infinity

  x-auth:
    image: alpine
    container_name: x-auth-test
    command: sleep infinity

  x-test-api:
    image: ghcr.io/nicolamaisa/api-privata:v1.0
    container_name: x-test-api
    ports:
      - "8080:8080"
    depends_on:
      - x-api
      - x-db
      - x-auth
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
